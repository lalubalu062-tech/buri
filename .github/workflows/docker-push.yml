name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Jab bhi main branch me code push hoga, ye chal jayega
  workflow_dispatch: # Isse tum manually bhi action run kar paoge

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Yahan dhyaan rakhna ki jeetmohale00 ki jagah tumhara actual Docker Hub username ho
          tags: jeetmohale00/buri:latest 
